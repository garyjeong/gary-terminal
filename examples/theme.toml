# gary-terminal 테마 템플릿
# 이 파일을 ~/.config/gary-terminal/themes/<이름>.toml 로 복사해 편집하세요.
# 파일명(확장자 제외)이 테마 이름이 됩니다. 앱에서 /theme <이름> 으로 적용.
name = "my-theme"       # 생략 시 파일명 사용
dark = true
primary    = "#7aa2f7"  # 강조/포커스
secondary  = "#bb9af7"
accent     = "#7dcfff"  # 사용자 메시지·도구 테두리
foreground = "#c0caf5"  # 기본 글자
background = "#1a1b26"  # 배경
surface    = "#24283b"  # 대화 영역
panel      = "#414868"  # 패널/모달
success    = "#9ece6a"  # 어시스턴트 테두리
warning    = "#e0af68"  # 승인 모달 테두리
error      = "#f7768e"  # 오류
