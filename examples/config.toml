# gary-terminal 설정 — ~/.config/gary-terminal/config.toml 로 복사
# 환경변수(GT_*)가 이 파일보다 우선합니다.
backend       = "ollama"                  # ollama | claude
model         = "qwen2.5-coder:7b"        # ollama 모델
claude_model  = "sonnet"                  # claude 모델 (sonnet/opus/haiku)
ollama_host   = "http://localhost:11434"
context_limit = 8000                      # 초과 시 자동 요약·압축
theme         = "gary-dark"               # /theme 목록의 이름
auto_escalate = false           # 로컬 실패 시 자동 승격
escalate_to   = "claude"        # 승격 대상 백엔드
subagent_write = false          # 서브에이전트 쓰기 도구 허용(승인 필요)
embed_model   = "nomic-embed-text"  # /index 의미검색 임베딩 (ollama pull 필요)
